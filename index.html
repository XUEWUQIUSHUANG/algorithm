<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法演示导航</title>
    <style>
        :root {
            --bg-1: #f7f9fc;
            --bg-2: #edf3ff;
            --text: #1f2a44;
            --muted: #6a7390;
            --card: #ffffff;
            --line: #dbe3f4;
            --primary: #2f6ff0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(4px);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 16px 40px rgba(31, 42, 68, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 26px;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        a {
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px 16px;
            font-weight: 600;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        a:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 10px 18px rgba(47, 111, 240, 0.16);
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>算法演示导航</h1>
        <p>选择一个模块进入对应算法页面。</p>
        <section class="grid">
            <a href="./冒泡排序.html">冒泡排序</a>
            <a href="./快速排序.html">快速排序</a>
            <a href="./归并排序.html">归并排序</a>
            <a href="./二分查找.html">二分查找</a>
            <a href="./线性时间选择.html">线性时间选择</a>
            <a href="./哈夫曼编码.html">哈夫曼编码</a>
            <a href="./最长公共子序列.html">最长公共子序列</a>
            <a href="./矩阵连乘.html">矩阵连乘</a>
            <a href="./最短路径.html">最短路径（分支限界法与动态规划法）</a>
            <a href="./0-1背包.html">0-1背包（回溯与分支限界）</a>
            <a href="./实现方法.html">实现方法</a>
        </section>
    </main>
</body>

</html>
